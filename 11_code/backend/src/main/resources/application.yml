server:
  port: ${AGENT_STUDIO_SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: agent-studio-api
  ai:
    openai:
      api-key: ${AGENT_STUDIO_OPENAI_API_KEY:}
  datasource:
    url: ${AGENT_STUDIO_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agent_studio}
    username: ${AGENT_STUDIO_DATASOURCE_USERNAME:agent_studio}
    password: ${AGENT_STUDIO_DATASOURCE_PASSWORD:agent_studio}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
  flyway:
    enabled: true
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-handlers-package: com.myagent.common.repository
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

agent:
  studio:
    runtime:
      default-agent-timeout-seconds: ${AGENT_STUDIO_RUNTIME_DEFAULT_AGENT_TIMEOUT_SECONDS:600}
      default-llm-timeout-seconds: ${AGENT_STUDIO_RUNTIME_DEFAULT_LLM_TIMEOUT_SECONDS:120}
      default-java-method-timeout-seconds: ${AGENT_STUDIO_RUNTIME_DEFAULT_JAVA_METHOD_TIMEOUT_SECONDS:30}
      default-external-agent-timeout-seconds: ${AGENT_STUDIO_RUNTIME_DEFAULT_EXTERNAL_AGENT_TIMEOUT_SECONDS:600}
      default-max-steps: ${AGENT_STUDIO_RUNTIME_DEFAULT_MAX_STEPS:30}
      default-max-agent-call-depth: ${AGENT_STUDIO_RUNTIME_DEFAULT_MAX_AGENT_CALL_DEPTH:3}
