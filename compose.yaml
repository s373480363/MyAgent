name: agent-studio

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_studio
      POSTGRES_USER: agent_studio
      POSTGRES_PASSWORD: ${AGENT_STUDIO_POSTGRES_PASSWORD:?AGENT_STUDIO_POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_studio -d agent_studio"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./11_code/backend
      dockerfile: Dockerfile
    image: agent-studio-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGENT_STUDIO_SERVER_PORT: 8080
      AGENT_STUDIO_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agent_studio
      AGENT_STUDIO_DATASOURCE_USERNAME: agent_studio
      AGENT_STUDIO_DATASOURCE_PASSWORD: ${AGENT_STUDIO_POSTGRES_PASSWORD:?AGENT_STUDIO_POSTGRES_PASSWORD is required}
      AGENT_STUDIO_SECRET_KEY: ${AGENT_STUDIO_SECRET_KEY:?AGENT_STUDIO_SECRET_KEY is required}
      AGENT_STUDIO_OPENAI_API_KEY: ${AGENT_STUDIO_OPENAI_API_KEY:?AGENT_STUDIO_OPENAI_API_KEY is required}
      AGENT_STUDIO_OPENAI_BASE_URL: ${AGENT_STUDIO_OPENAI_BASE_URL:-https://api.openai.com}
      AGENT_STUDIO_OPENAI_DEFAULT_MODEL: ${AGENT_STUDIO_OPENAI_DEFAULT_MODEL:-gpt-4.1-mini}

  web:
    build:
      context: ./11_code/frontend
      dockerfile: Dockerfile
    image: agent-studio-web
    depends_on:
      api:
        condition: service_started
    ports:
      - "18080:80"

volumes:
  postgres-data:
